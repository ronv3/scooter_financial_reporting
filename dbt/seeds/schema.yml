version: 2

seeds:
  - name: rides
    config:
      column_types:
        order_id: varchar
        ride_id: bigint
        scooter_id: integer
        start_time: timestamp
        end_time: timestamp
        duration_min: integer
        distance_km: double
        amount: decimal(10,2)
        vat_rate: double
        vat_amount: decimal(10,2)
        sum_with_vat_amount: decimal(10,2)
        currency: varchar
        coupon_used: varchar
        coupon_amount: decimal(10,2)
        city: varchar
        country: varchar

  - name: account_mapping
    config:
      column_types:
        line_type: varchar
        country: varchar
        account_code: varchar
        account_name: varchar
        account_category: varchar
        normal_side: varchar
