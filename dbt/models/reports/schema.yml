version: 2

models:
  - name: rpt_income_statement_detail
    description: >
      Account-level income statement line items, materialised as an
      incremental table (delete+insert by period_end). Each run adds the
      current period's rows; previous periods remain untouched. Revenue
      and expense rows with no totals — clean separation of detail from
      aggregates.
    columns:
      - name: period_start
        tests:
          - not_null
      - name: period_end
        tests:
          - not_null
      - name: section
        tests:
          - not_null
          - accepted_values:
              values: ['Revenue', 'Expenses']
      - name: account_code
        tests:
          - not_null
      - name: amount
        tests:
          - not_null

  - name: rpt_income_statement_summary
    description: >
      Period-level income statement summary, materialised as an
      incremental table (delete+insert by period_end). One row per
      period with total revenue, total expenses, and net income.
      Historical periods accumulate across runs.
    columns:
      - name: period_start
        tests:
          - not_null
      - name: period_end
        tests:
          - not_null
      - name: total_revenue
        tests:
          - not_null
      - name: total_expenses
        tests:
          - not_null
      - name: net_income
        tests:
          - not_null

  - name: rpt_balance_sheet_detail
    description: >
      Account-level balance sheet as of the period end date (cumulative
      point-in-time), materialised as an incremental table (delete+insert
      by report_date). Each run adds a snapshot for the current period;
      previous snapshots remain untouched. Assets, liabilities, and
      equity rows with no totals.
    columns:
      - name: report_date
        tests:
          - not_null
      - name: section
        tests:
          - not_null
          - accepted_values:
              values: ['Assets', 'Liabilities', 'Equity']
      - name: account_code
        tests:
          - not_null
      - name: balance
        tests:
          - not_null

  - name: rpt_balance_sheet_summary
    description: >
      Period-level balance sheet summary, materialised as an incremental
      table (delete+insert by report_date). One row per report date with
      total assets, liabilities, equity, and equation validation.
      Historical snapshots accumulate across runs. The equation_balanced
      flag uses a 0.001 threshold.
    columns:
      - name: report_date
        tests:
          - not_null
      - name: total_assets
        tests:
          - not_null
      - name: total_liabilities
        tests:
          - not_null
      - name: total_equity
        tests:
          - not_null
      - name: equation_balanced
        description: "Must be true — Assets = Liabilities + Equity (threshold 0.001)"
